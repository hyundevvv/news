name: Stock News Scraper

on:
  schedule:
    # KST 06:00 ~ 23:30 매 30분마다 실행 (UTC 21:00 ~ 14:30)
    # 00~05시 KST 제외
    - cron: "*/30 0-14,21-23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 deep-translator

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "H_NEWS STOCK 실시간(30분) 자동 업데이트: $(date)" && git push origin main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
