name: Daily News Scraper

on:
  schedule:
    # 08:00 KST (23:00 UTC)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write # 깃허브 서버가 저장소에 쓰기 권한을 갖도록 설정

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 최신 버전으로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전으로 업데이트
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "데이터 자동 업데이트: $(date)" || echo "변경 사항 없음"
          git push
