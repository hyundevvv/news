<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H_NEWS | THE MODERN JOURNAL</title>
    <meta name="description" content="실시간 글로벌 주요 뉴스 큐레이션 서비스">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-area">
                <h1 class="logo-text">H_NEWS</h1>
            </div>
            <div class="date-info" id="current-date">
                <!-- 날짜가 자바스크립트로 주입됩니다 -->
            </div>
            <div class="nav-wrapper">
                <nav class="tab-nav">
                    <button class="tab-btn active" data-category="TOP">주요 뉴스</button>
                    <button class="tab-btn" data-category="FINANCE">경제·금융</button>
                    <button class="tab-btn" data-category="TECH">테크·IT</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="news-grid" class="grid-container">
            <!-- 기사 카드가 자바스크립트로 주입됩니다 -->
            <div class="loading-state">
                <p>뉴스를 불러오고 있습니다...</p>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
