<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H_NEWS | STOCK & FINANCE JOURNAL</title>
    <meta name="description" content="실시간 국내외 증시 시황 및 종목 분석 전문 뉴스 포털">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 지수 티커 바 -->
    <div class="ticker-container">
        <div id="ticker-wrapper" class="ticker-wrapper">
            <!-- 지수 정보 주입 -->
        </div>
    </div>

    <header>
        <div class="update-bar">
            UPDATED: <span id="last-updated-time">-</span>
        </div>
        <div class="header-container">
            <div class="logo-area">
                <h1 class="logo-text">H_NEWS <span style="font-size:0.8rem; color:#0047bb;">STOCK</span></h1>
            </div>
            <div class="nav-wrapper">
                <nav class="tab-nav">
                    <button class="tab-btn active" data-category="K-MARKET">국내증시</button>
                    <button class="tab-btn" data-category="GLOBAL">해외증시</button>
                    <button class="tab-btn" data-category="MACRO">거시경제</button>
                    <button class="tab-btn" data-category="INDUSTRY">산업·테마</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="news-grid" class="grid-container">
            <!-- 뉴스 카드 주입 -->
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
